name: Sync main from latest release branch

# Update the branch list below when a new release branch becomes the latest.
# main is protected — it is only updated by this Action.
on:
  push:
    branches:
      - 3.4-ea2  # <-- change this to the latest release branch

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward main to latest release branch
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
        run: |
          git checkout main
          git merge --ff-only "$SOURCE_BRANCH"
          git push origin main
